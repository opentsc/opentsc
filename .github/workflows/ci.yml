name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run skill smoke test
        working-directory: skill
        run: python tests/smoke.py

      - name: Run v2 module tests (graceful-degradation path, no extra deps)
        working-directory: skill
        run: python tests/test_v2.py

  pii-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against real instance data leaking in
        run: |
          # Fail the build if known private identifiers reappear in the repo.
          if grep -rinE "wxid_|@chatroom|/documents/hermes|hermes-stanley" . \
               --include='*.md' --include='*.py' --include='*.txt' ; then
            echo "::error::Private instance data detected — scrub before committing."
            exit 1
          fi
          echo "No private instance data found."

  version-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SKILL.md version must match the latest CHANGELOG entry
        run: |
          # major.minor from "# OpenTSC vX.Y Skill" in SKILL.md
          skill=$(grep -oE 'OpenTSC v[0-9]+\.[0-9]+' skill/SKILL.md | head -1 | grep -oE '[0-9]+\.[0-9]+')
          # major.minor from the first "## [X.Y.Z]" in CHANGELOG.md
          chg=$(grep -oE '^\## \[[0-9]+\.[0-9]+' CHANGELOG.md | head -1 | grep -oE '[0-9]+\.[0-9]+')
          echo "SKILL.md=$skill  CHANGELOG=$chg"
          if [ "$skill" != "$chg" ]; then
            echo "::error::SKILL.md ($skill) is out of sync with CHANGELOG ($chg). Bump SKILL.md frontmatter + heading."
            exit 1
          fi
          echo "Version in sync: v$skill"
